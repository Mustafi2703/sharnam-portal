services:
  - type: web
    name: sharnam-portal
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npx prisma generate && npm run build -w @sharnam/web && test -f apps/web/dist/index.html && ls -la apps/web/dist/assets | head
    startCommand: npx prisma db push && npx tsx seed/seed.ts && npm run start -w @sharnam/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Free-tier demo: SQLite file (ephemeral). For a durable client demo, attach
      # Render Postgres and change prisma/schema.prisma provider to "postgresql",
      # then set DATABASE_URL from the database connection string.
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: MOCK_ONEDRIVE
        value: "true"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: SEED_PASSWORD
        value: Demo@1234
      - key: WEB_ORIGIN
        value: "*"
      - key: VITE_API_URL
        value: ""
      - key: SHARNAM_EXCEL_ROOT
        value: "."
