services:
  - type: web
    name: sharnam-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && SHARNAM_EXCEL_ROOT=. npx tsx seed/seed.ts && npm run start -w @sharnam/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: MOCK_ONEDRIVE
        value: "true"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: SEED_PASSWORD
        value: Demo@1234
      - key: WEB_ORIGIN
        value: "*"
      - key: PORT
        value: "10000"

  - type: web
    name: sharnam-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build -w @sharnam/web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
